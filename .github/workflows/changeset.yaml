name: Changeset

on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-changeset
          key: cargo-changeset-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo install cargo-changeset --version 0.1.7

      - run: cargo changeset verify --base-branch "origin/main"
