name: Release

on:
  workflow_dispatch:

jobs:
  update-changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-changeset
          key: cargo-changeset-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo install cargo-changeset --version 0.1.7

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: cargo changeset release

      - run: git push origin HEAD --tags
